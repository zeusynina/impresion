<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEUS CORE TV</title>
    <style>
        body, html {
            margin: 0; padding: 0; 
            height: 100%; width: 100%;
            background-color: #000; 
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* --- LA FRANJA NEGRA DE MARCA --- */
        .franja-marca {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 35px; 
            background: #050505;
            border-bottom: 2px solid #00f2ff;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10005;
            box-shadow: 0 5px 15px rgba(0, 242, 255, 0.15);
        }

        .texto-marca {
            color: #00f2ff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 6px;
            font-size: 13px;
            text-shadow: 0 0 8px #00f2ff;
        }

        /* MENU DE SELECCIÓN */
        .overlay-inicio {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10010;
            gap: 20px;
        }

        .btn-zeus {
            padding: 15px 40px;
            width: 280px;
            font-size: 16px;
            color: #00f2ff;
            border: 2px solid #00f2ff;
            background: rgba(0, 242, 255, 0.05);
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .panel-controles {
            position: fixed;
            top: 45px; 
            right: 15px;
            z-index: 10006;
            display: none;
        }

        .btn-volver {
            background: rgba(10, 10, 10, 0.9);
            color: #00f2ff;
            border: 1px solid #00f2ff;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 11px;
            border-radius: 4px;
        }

        /* CONTENEDOR FLEXIBLE */
        .contenedor-cine {
            position: relative;
            width: 100vw;
            height: calc(100vh - 35px);
            margin-top: 35px;
            display: none;
            overflow: hidden;
            background: #000;
        }

        /* AJUSTE DINÁMICO DEL VIDEO */
        iframe {
            position: absolute;
            border: none;
            /* Valores base para PC */
            width: 100%;
            height: 170%; 
            top: -35%;
            left: 0;
        }

        /* AJUSTES PARA CELULARES Y SMART TV (PANTALLAS PEQUEÑAS O VERTICALES) */
        @media (max-width: 1024px) {
            iframe {
                height: 100%;
                top: 0;
                transform: scale(1.0); /* En móviles no escalamos tanto para no perder bordes */
            }
            .contenedor-cine {
                margin-top: 35px;
                height: calc(100vh - 35px);
            }
        }

        #escudo-zeus {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 100;
            display: none;
        }
    </style>
</head>
<body>

    <div class="franja-marca" id="barra-titulo">
        <div class="texto-marca" id="nombre-display">ZEUS CORE TV</div>
    </div>

    <div class="overlay-inicio" id="menu">
        <h2 style="color:#00f2ff; letter-spacing:4px;">ZEUS CORE</h2>
        <div id="lista-canales" style="display:flex; flex-direction:column; gap:10px;"></div>
    </div>

    <div class="panel-controles" id="controles">
        <button class="btn-volver" onclick="window.location.reload()">🔄 VOLVER</button>
    </div>

    <div class="contenedor-cine" id="cine">
        <div id="escudo-zeus"></div>
        <iframe id="video-frame" src="" allow="autoplay; encrypted-media; fullscreen"></iframe>
    </div>

    <script>
        const canales = [
            { nombre: "Win Sports Premium", url: "https://futbol-libre.su/win-sports-premium/" }
        ];

        const lista = document.getElementById('lista-canales');
        const frame = document.getElementById('video-frame');
        const escudo = document.getElementById('escudo-zeus');

        canales.forEach(c => {
            const b = document.createElement('button');
            b.className = 'btn-zeus';
            b.innerText = c.nombre;
            b.onclick = () => {
                // Forzar pantalla completa en móviles
                const doc = document.documentElement;
                if (doc.requestFullscreen) doc.requestFullscreen();
                else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();

                document.getElementById('menu').style.display = 'none';
                document.getElementById('barra-titulo').style.display = 'flex';
                document.getElementById('controles').style.display = 'block';
                document.getElementById('cine').style.display = 'block';
                document.getElementById('nombre-display').innerText = `ZEUS CORE: ${c.nombre}`;
                
                frame.src = c.url;
                escudo.style.display = 'block';
                escudo.style.pointerEvents = 'none';

                const monitor = setInterval(() => {
                    if (document.activeElement === frame) {
                        escudo.style.pointerEvents = 'auto';
                        clearInterval(monitor);
                    }
                }, 100);
            };
            lista.appendChild(b);
        });
    </script>
</body>
</html>
