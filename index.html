<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEUS CORE TV</title>
    <style>
        body, html {
            margin: 0; padding: 0; 
            height: 100%; width: 100%;
            background-color: #000; 
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* FRANJA SUPERIOR */
        .franja-marca {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 35px; 
            background: #050505;
            border-bottom: 2px solid #00f2ff;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10005;
        }

        .texto-marca {
            color: #00f2ff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 13px;
            text-shadow: 0 0 8px #00f2ff;
        }

        /* MENU INICIAL */
        .overlay-inicio {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10010;
        }

        .btn-zeus {
            padding: 15px 40px;
            width: 300px;
            margin: 10px;
            font-size: 16px;
            color: #00f2ff;
            border: 2px solid #00f2ff;
            background: rgba(0, 242, 255, 0.05);
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        /* CONTENEDOR MAESTRO */
        .contenedor-cine {
            position: relative;
            width: 100vw;
            height: calc(100vh - 35px);
            margin-top: 35px;
            display: none;
            overflow: hidden;
            background: #000;
        }

        /* El iframe ahora es controlado totalmente por JS */
        iframe {
            position: absolute;
            border: none;
            left: 0;
            transform-origin: top center;
        }

        #escudo-zeus {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 100;
        }

        .panel-controles {
            position: fixed;
            top: 45px; right: 15px;
            z-index: 10006;
            display: none;
        }

        .btn-volver {
            background: rgba(10, 10, 10, 0.9);
            color: #00f2ff;
            border: 1px solid #00f2ff;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 11px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="franja-marca" id="barra-titulo">
        <div class="texto-marca" id="nombre-display">ZEUS CORE TV</div>
    </div>

    <div class="overlay-inicio" id="menu">
        <h2 style="color: #00f2ff; letter-spacing: 5px;">ZEUS CORE SYSTEM</h2>
        <div id="lista-botones"></div>
    </div>

    <div class="panel-controles" id="controles">
        <button class="btn-volver" onclick="window.location.reload()">🔄 VOLVER</button>
    </div>

    <div class="contenedor-cine" id="cine-display">
        <div id="escudo-zeus"></div>
        <iframe id="video-frame" src="" allow="autoplay; encrypted-media; fullscreen" scrolling="no"></iframe>
    </div>

    <script>
        const canales = [
            { nombre: "Win Sports Premium", url: "https://futbol-libre.su/win-sports-premium/" }
        ];

        const videoFrame = document.getElementById('video-frame');
        const escudo = document.getElementById('escudo-zeus');

        // FUNCIÓN MÁGICA DE AUTO-AJUSTE
        function ajustarResolucion() {
            const h = window.innerHeight;
            const w = window.innerWidth;
            
            // Si es una pantalla grande (PC o TV 4K/1080p)
            if (w > 1200) {
                videoFrame.style.width = "100%";
                videoFrame.style.height = (h * 1.8) + "px"; // Aumentamos altura para el recorte
                videoFrame.style.top = "-" + (h * 0.45) + "px"; // Subimos el video proporcionalmente
                videoFrame.style.transform = "scale(1.2)";
            } 
            // Si es una Smart TV mediana o Tablet
            else if (w <= 1200 && w > 600) {
                videoFrame.style.width = "100%";
                videoFrame.style.height = "100%";
                videoFrame.style.top = "0";
                videoFrame.style.transform = "scale(1.0)";
            }
            // Si es un celular
            else {
                videoFrame.style.width = "100%";
                videoFrame.style.height = "100%";
                videoFrame.style.top = "0";
                videoFrame.style.transform = "scale(1.0)";
            }
        }

        canales.forEach((canal) => {
            const boton = document.createElement('button');
            boton.className = 'btn-zeus';
            boton.innerText = canal.nombre;
            boton.onclick = () => {
                const doc = document.documentElement;
                if (doc.requestFullscreen) doc.requestFullscreen();
                else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
                
                document.getElementById('menu').style.display = 'none';
                document.getElementById('barra-titulo').style.display = 'flex';
                document.getElementById('controles').style.display = 'block';
                document.getElementById('cine-display').style.display = 'block';
                document.getElementById('nombre-display').innerText = `ZEUS CORE: ${canal.nombre}`;
                
                // Ejecutamos el ajuste antes de cargar
                ajustarResolucion();
                videoFrame.src = canal.url;
                
                escudo.style.display = 'block';
                escudo.style.pointerEvents = 'none';

                const monitor = setInterval(() => {
                    if (document.activeElement === videoFrame) {
                        escudo.style.pointerEvents = 'auto';
                        clearInterval(monitor);
                    }
                }, 100);
            };
            document.getElementById('lista-botones').appendChild(boton);
        });

        // Re-ajustar si se gira el celular o se cambia el tamaño de ventana
        window.onresize = ajustarResolucion;
    </script>
</body>
</html>
