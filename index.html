<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEUS TV PRO</title>

<style>
* { box-sizing: border-box; }

body, html {
    margin: 0;
    padding: 0;
    background: black;
    font-family: 'Segoe UI', sans-serif;
    color: white;
}

/* 🎬 VIDEO */
iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: calc(100% - 80px);
    border: none;
}

/* 📺 MODO TV */
.tv-mode iframe {
    top: -150px;
    height: calc(100% + 300px);
}

/* 🔽 FRANJA ABAJO */
#franja-player {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 80px;
    background: black;
}

/* 🔼 FRANJA ARRIBA */
#franja-oculta {
    position: absolute;
    top: 20px;
    width: 100%;
    height: 150px;
    background: black;
    pointer-events: none;
}

/* 🛡️ BLOQUEADOR */
#bloqueador {
    position: absolute;
    top: 40px;
    width: 100%;
    height: calc(100% - 40px);
}

/* 🔝 TOPBAR */
.topbar {
    position: absolute;
    top: 0;
    width: 100%;
    height: 40px;
    background: rgba(0,0,0,0.8);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 10px;
    z-index: 10;
}

button {
    background: black;
    border: 1px solid #00f2ff;
    color: #00f2ff;
    cursor: pointer;
}

/* 🔥 MENÚ FULL */
#menu {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-y: auto;
    padding-top: 40px;
}

.categoria {
    width: 100%;
    max-width: 800px;
}

.categoria h2 {
    color: #00f2ff;
    text-align: center;
}

/* 🎯 BOTONES GRANDES */
.canal {
    width: 100%;
    padding: 20px;
    margin: 10px 0;
    text-align: center;
    border: 2px solid #00f2ff;
    cursor: pointer;
    font-size: 18px;
}

.canal:hover {
    background: #00f2ff;
    color: black;
    transform: scale(1.05);
}

/* 🆘 BOTÓN FALLBACK */
#abrirDirecto {
    position: absolute;
    bottom: 100px;
    left: 20px;
    display: none;
}
</style>

</head>

<body>

<div id="menu"></div>

<div class="topbar">
    <div id="titulo">ZEUS TV</div>
    <div>
        <button onclick="volver()">VOLVER</button>
    </div>
</div>

<div id="bloqueador"></div>
<div id="franja-oculta"></div>

<iframe id="player"></iframe>

<div id="franja-player"></div>

<button id="abrirDirecto">Abrir directo</button>

<script>

/* DETECTAR TV */
function detectarTV() {
    const ua = navigator.userAgent.toLowerCase();

    if (ua.includes("smarttv") || ua.includes("tizen") || ua.includes("webos") || window.innerWidth > 1300) {
        document.body.classList.add("tv-mode");
    }
}
detectarTV();

/* DATA */
const data = {
"Deportes":[
{nombre:"Win Sports+", url:"https://futbol-libre.su/win-sports-premium/"},
{nombre:"ESPN", url:"https://futbol-libre.su/espn-1/"}
],
"Internacional":[
{nombre:"Fox Sports", url:"https://futbol-libre.su/fox-sports/"}
]
};

const menu = document.getElementById("menu");
const player = document.getElementById("player");
const titulo = document.getElementById("titulo");
const btnDirecto = document.getElementById("abrirDirecto");

/* CREAR MENÚ */
for (let cat in data) {
    let cont = document.createElement("div");
    cont.className = "categoria";

    let h = document.createElement("h2");
    h.innerText = cat;
    cont.appendChild(h);

    data[cat].forEach(c => {
        let btn = document.createElement("div");
        btn.className = "canal";
        btn.innerText = c.nombre;

        btn.onclick = () => {
            abrirCanal(c);
        };

        cont.appendChild(btn);
    });

    menu.appendChild(cont);
}

/* ABRIR CANAL */
function abrirCanal(c){
    player.src = c.url;
    titulo.innerText = c.nombre;

    menu.style.display = "none";

    btnDirecto.style.display = "block";
    btnDirecto.onclick = () => {
        window.location.href = c.url;
    };
}

/* VOLVER */
function volver(){
    player.src = "";
    menu.style.display = "flex";
    titulo.innerText = "ZEUS TV";
    btnDirecto.style.display = "none";
}

</script>

</body>
</html>
