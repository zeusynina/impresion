<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEUS CORE TV</title>
    <style>
        body, html {
            margin: 0; padding: 0; 
            height: 100%; width: 100%;
            background-color: #000; 
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        .franja-marca {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 35px; 
            background: #050505;
            border-bottom: 2px solid #00f2ff;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10005;
        }

        .texto-marca {
            color: #00f2ff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 6px;
            font-size: 13px;
        }

        .overlay-inicio {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10010;
            gap: 20px;
        }

        .btn-zeus {
            padding: 15px 40px;
            width: 300px;
            font-size: 16px;
            color: #00f2ff;
            border: 2px solid #00f2ff;
            background: rgba(0, 242, 255, 0.05);
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        .contenedor-cine {
            position: fixed;
            top: 35px;
            left: 0;
            width: 100vw;
            height: calc(100vh - 35px);
            display: none; 
            background: #000;
            flex-direction: column;
        }

        iframe {
            flex-grow: 1;
            width: 100%;
            border: none;
            background: #000;
        }

        .panel-controles {
            position: fixed;
            top: 45px; right: 15px;
            z-index: 10006;
            display: none;
        }

        .btn-volver {
            background: rgba(10, 10, 10, 0.9);
            color: #00f2ff;
            border: 1px solid #00f2ff;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 11px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="franja-marca" id="barra-titulo">
        <div class="texto-marca" id="nombre-canal-display">ZEUS STREAM TV</div>
    </div>

    <div class="overlay-inicio" id="menu-canales">
        <h2 style="color: #00f2ff; letter-spacing: 5px; margin-bottom: 20px;">SELECCIONAR CANAL</h2>
        <div id="lista-botones" style="display: flex; flex-direction: column; gap: 15px;"></div>
    </div>

    <div class="panel-controles" id="controles">
        <button class="btn-volver" onclick="window.location.reload()">🔄 VOLVER</button>
    </div>

    <div class="contenedor-cine" id="cine-display">
        <iframe id="video-frame" src="" allow="autoplay; encrypted-media; fullscreen" scrolling="no"></iframe>
    </div>

    <script>
        const canales = [
            { nombre: "Win Sports Plus", url: "https://futbol-libre.su/win-sports-premium/" },
            { nombre: "fox sports", url: "https://futbol-libre.su/fox-sports/" },
            { nombre: "ESPN", url: "https://futbol-libre.su/espn-1/" }
        ];

        const videoFrame = document.getElementById('video-frame');
        const cineDisplay = document.getElementById('cine-display');

        async function forzarRotacion() {
            try {
                // Primero intentamos entrar en pantalla completa (necesario para rotar)
                const doc = document.documentElement;
                if (doc.requestFullscreen) await doc.requestFullscreen();
                else if (doc.webkitRequestFullscreen) await doc.webkitRequestFullscreen();

                // Intentamos bloquear la orientación a horizontal
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                }
            } catch (error) {
                console.log("La rotación automática fue bloqueada o no es soportada:", error);
            }
        }

        canales.forEach((canal) => {
            const boton = document.createElement('button');
            boton.className = 'btn-zeus';
            boton.innerText = canal.nombre;
            boton.onclick = async () => {
                // Ejecutar rotación y pantalla completa
                await forzarRotacion();
                
                document.getElementById('menu-canales').style.display = 'none';
                document.getElementById('barra-titulo').style.display = 'flex';
                document.getElementById('controles').style.display = 'block';
                
                cineDisplay.style.display = 'flex';
                
                // Ajuste de altura forzado
                videoFrame.style.height = (window.innerHeight - 35) + "px";
                videoFrame.src = canal.url;
                
                document.getElementById('nombre-canal-display').innerText = `ZEUS CORE: ${canal.nombre}`;
            };
            document.getElementById('lista-botones').appendChild(boton);
        });

        window.onresize = () => {
            if (cineDisplay.style.display === 'flex') {
                videoFrame.style.height = (window.innerHeight - 35) + "px";
            }
        };
    </script>
</body>
</html>
